<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>救急外来 主訴ナビ</title>
  <link rel="stylesheet" href="er-note.css" />
  <style>
    body { max-width: 960px; margin: 0 auto; padding: 16px; }
    .hero { padding: 0.25rem 0.25rem 0.75rem; }
    .hero h1 { margin: 0 0 0.35rem; font-size: 1.55rem; line-height: 1.3; }
    .hero p { margin: 0; color: var(--muted); font-size: 0.95rem; }
    .search {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: var(--surface);
      color: var(--text);
      margin: 10px 0 18px;
      box-shadow: var(--shadow);
    }
    .search:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
    .sec { margin-top: 1.25rem; }
    .sec h2 {
      margin: 0.35rem 0 0.6rem;
      font-size: 1.1rem;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 0.3rem;
      scroll-margin-top: 70px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 8px;
    }
    a.card {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 56px;
      padding: 10px 12px;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      color: var(--text);
      background: var(--surface);
      box-shadow: var(--shadow);
      transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
      line-height: 1.3;
    }
    a.card:hover { background: var(--card-hover); border-color: var(--accent); }
    a.card:active { transform: scale(0.97); background: var(--accent-weak); }
    .empty { color: var(--muted); font-size: 0.9rem; padding: 0.4rem 0.1rem; display: none; }
    @media (max-width: 420px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 7px; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>救急外来 主訴ナビ</h1>
    <p>主訴 / 疾患名で絞り込みできます。</p>
  </section>

  <input
    id="q"
    class="search"
    type="search"
    inputmode="search"
    placeholder="例：胸痛 / ACS / めまい / アナフィラキシー"
    autocomplete="off"
  />
  <p class="empty" id="empty">該当なし</p>

  <section class="sec">
    <h2>主訴</h2>
    <div class="grid" data-group="主訴">
      <a class="card" href="./めまい.html">めまい</a>
      <a class="card" href="./頭痛.html">頭痛</a>
      <a class="card" href="./発熱.html">発熱</a>
      <a class="card" href="./胸痛.html">胸痛</a>
      <a class="card" href="./呼吸困難.html">呼吸困難</a>
      <a class="card" href="./腹痛.html">腹痛</a>
      <a class="card" href="./嘔気・嘔吐.html">嘔気・嘔吐</a>
      <a class="card" href="./下痢.html">下痢</a>
      <a class="card" href="./吐血.html">吐血</a>
      <a class="card" href="./血便・下血.html">血便・下血</a>
      <a class="card" href="./意識障害.html">意識障害</a>
      <a class="card" href="./意識消失.html">意識消失</a>
      <a class="card" href="./構音障害.html">構音障害</a>
      <a class="card" href="./アナフィラキシー疑い.html">アナフィラキシー疑い</a>
      <a class="card" href="./転倒.html">転倒</a>
      <a class="card" href="./股関節痛.html">股関節痛</a>
      <a class="card" href="./心肺停止.html">心肺停止</a>
    </div>
  </section>

  <section class="sec">
    <h2>入院時心電図・循環器</h2>
    <div class="grid" data-group="循環器">
      <a class="card" href="./入院時心電図.html">入院時心電図</a>
      <a class="card" href="./疾患詳細/STEMI.html">STEMI</a>
      <a class="card" href="./疾患詳細/de Winterパターン.html">de Winter</a>
      <a class="card" href="./疾患詳細/Wellens症候群.html">Wellens</a>
      <a class="card" href="./疾患詳細/後壁梗塞.html">後壁梗塞</a>
      <a class="card" href="./疾患詳細/高度房室ブロック.html">高度房室ブロック</a>
      <a class="card" href="./疾患詳細/交代性脚ブロック.html">交代性脚ブロック</a>
      <a class="card" href="./疾患詳細/二枝ブロック.html">二枝ブロック</a>
      <a class="card" href="./疾患詳細/高K血症心電図.html">高K血症</a>
      <a class="card" href="./疾患詳細/Brugada心電図.html">Brugada</a>
      <a class="card" href="./疾患詳細/QT延長.html">QT延長</a>
      <a class="card" href="./疾患詳細/旧心電図と内服確認.html">旧心電図・内服</a>
      <a class="card" href="./疾患詳細/循環器コンサルトの判断.html">循環器コンサルト</a>
    </div>
  </section>

  <section class="sec">
    <h2>疾患詳細</h2>
    <div class="grid">
      <a class="card" href="./疾患詳細/index.html">疾患詳細インデックス（一覧）</a>
    </div>
  </section>

  <script>
    (function () {
      var q = document.getElementById("q");
      var empty = document.getElementById("empty");
      var cards = Array.prototype.slice.call(document.querySelectorAll(".grid a.card"));
      var sections = Array.prototype.slice.call(document.querySelectorAll(".sec"));

      function normalize(s) {
        return (s || "").toString().toLowerCase();
      }
      function apply() {
        var term = normalize(q.value).trim();
        var anyVisible = false;
        cards.forEach(function (a) {
          var hit = term === "" || normalize(a.textContent).indexOf(term) !== -1;
          a.style.display = hit ? "" : "none";
          if (hit) anyVisible = true;
        });
        sections.forEach(function (sec) {
          var visibleInSec = sec.querySelectorAll(".grid a.card:not([style*='display: none'])").length;
          sec.style.display = visibleInSec === 0 && term !== "" ? "none" : "";
        });
        empty.style.display = anyVisible ? "none" : "";
      }
      q.addEventListener("input", apply);
      q.addEventListener("search", apply);
    })();
  </script>
</body>
</html>
